name: Private EC2 via SSM and ECR (Dual Deployment)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 1. FastAPI 이미지 빌드 및 푸시
      - name: Build and Push FastAPI to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_FASTAPI }}
          IMAGE_TAG: "latest"
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./fastapi
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 2. Nginx 이미지 빌드 및 푸시
      - name: Build and Push Nginx to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NGINX }}
          IMAGE_TAG: "latest"
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 3. EC2에 배포 (SSM)
      - name: Deploy to EC2 via SSM
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          NGINX_REPO: ${{ secrets.ECR_REPOSITORY_NGINX }}
          FASTAPI_REPO: ${{ secrets.ECR_REPOSITORY_FASTAPI }}
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin '$REGISTRY'",
                "sudo docker pull '$REGISTRY'/'$FASTAPI_REPO':latest",
                "sudo docker pull '$REGISTRY'/'$NGINX_REPO':latest",
                "sudo docker stop nginx-container fastapi-container || true",
                "sudo docker rm nginx-container fastapi-container || true",
                "sudo docker run -d --name fastapi-container '$REGISTRY'/'$FASTAPI_REPO':latest",
                "sudo docker run -d --name nginx-container -p 80:80 --link fastapi-container '$REGISTRY'/'$NGINX_REPO':latest"
              ]}' \
            --region ${{ secrets.AWS_REGION }}