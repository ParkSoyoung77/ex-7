server {
    listen 80;
    server_name aaa.sy99.cloud;

    # 1. 정적 파일 (Nginx 주황색 페이지) 설정
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FastAPI 백엔드 (남색 API 페이지) 프록시 설정
    location /api {
        # 'fastapi-container'는 docker run 시 지정할 컨테이너 이름입니다.
        proxy_pass http://fastapi-container:8000;
        
        # 실제 클라이언트 IP와 호스트 정보를 전달하기 위한 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. ALB 헬스체크를 위한 설정 (필요 시)
    location /health {
        proxy_pass http://fastapi-container:8000/health;
    }

    # 에러 페이지 설정
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}